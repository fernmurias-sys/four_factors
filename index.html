*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',-apple-system,sans-serif}
body{background:#0d0d0d;color:#fff;min-height:100vh}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 48px}
.tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block}
.tag-ml{background:rgba(167,139,250,.12);color:#a78bfa}
.tag-spr{background:rgba(0,200,5,.08);color:#00c805}
.tag-dog{background:rgba(245,158,11,.1);color:#f59e0b}
.stat-row{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-radius:8px;margin-bottom:4px}
.stat-good{background:rgba(0,200,5,.04);border:1px solid rgba(0,200,5,.08)}
.stat-bad{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.08)}
.card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:18px 16px;margin-bottom:10px}
.other{border-bottom:1px solid rgba(255,255,255,.05);padding:14px 0}
.btn{width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(255,255,255,.45);font-family:inherit;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.08);color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal{width:100%;max-width:640px;max-height:93vh;background:#141414;border-radius:20px 20px 0 0;overflow:auto;padding:16px 16px 40px;animation:su .25s ease}
.pbar{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .6s}
.h2h-row{display:flex;align-items:center;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.025)}
.h2h-label{width:70px;text-align:center;font-size:10px;color:rgba(255,255,255,.3);font-weight:500}
.h2h-val{flex:1;font-size:13px;font-variant-numeric:tabular-nums}
.h2h-win{font-weight:700;color:#fff}
.h2h-lose{font-weight:400;color:rgba(255,255,255,.3)}
.hidden{display:none}
</style>

<div style="background:rgba(255,255,255,.02);border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-bottom:4px">WHAT DOES THE EDGE MEAN?</div><div style="font-size:12px;color:rgba(255,255,255,.55);line-height:1.6">${edgeExplain}</div></div>
<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;padding:0 4px;margin-bottom:6px"><span style="font-size:11px;font-weight:700">(${h.seed}) ${g.home} <span style="font-weight:400;color:rgba(255,255,255,.3)">${h.rec} · #${h.rk}</span></span><span style="font-size:11px;font-weight:700"><span style="font-weight:400;color:rgba(255,255,255,.3)">#${a.rk} · ${a.rec}</span> ${g.away} (${a.seed})</span></div>${statsHtml}</div>
<div style="margin-bottom:16px"><div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-bottom:8px">NATIONAL PERCENTILE (of 365 D1 teams)</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${pctsHtml}</div></div>
${g.injury?`<div style="background:rgba(255,255,255,.02);border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-bottom:4px">INJURY NOTES</div><div style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.5">${g.injury}</div></div>`:''}
<button class="btn" onclick="closeModal()">Close</button></div></div>`;
}

function openModal(idx,isBig){
  modalData=isBig?BIG[idx]:OTHERS[idx];
  document.getElementById('modal-container').innerHTML=renderModal(modalData);
}
function closeModal(){document.getElementById('modal-container').innerHTML='';modalData=null;}

function render(){
  const app=document.getElementById('app');
  let html=`
<div style="margin-bottom:28px;animation:fi .4s ease">
<div style="font-size:11px;color:rgba(255,255,255,.3)">Saturday March 21 · NCAA Round of 32</div>
<div style="font-size:28px;font-weight:800;letter-spacing:-.5px;margin-top:2px">Today's Card</div></div>

<div style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:28px;animation:fi .4s ease .05s both">
<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-bottom:8px">HOW THIS WORKS</div>
<div style="font-size:13px;color:rgba(255,255,255,.55);line-height:1.7">We built a model that learned what stats predict tournament winners — trained on <strong style="color:#fff">19,452 matchups across 12 NCAA tournament seasons</strong> (2013–2025). It computes a win probability and a projected point margin for each matchup, then compares to Vegas lines. When the model sees a significant gap, that's edge — and that's where we bet. Spread edge is measured in <strong style="color:#00c805">points</strong>. ML edge is measured in <strong style="color:#a78bfa">win probability %</strong>.</div>
<div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">${[["84.1%","Test Accuracy"],["12","Seasons Trained"],["Spreads + ML Dogs","Bet Types"]].map(([v,l])=>`<div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px;font-weight:800;color:#00c805">${v}</span><span style="font-size:11px;color:rgba(255,255,255,.3)">${l}</span></div>`).join('')}</div></div>

<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;animation:fi .4s ease .1s both">Top 3 Plays</div>`;

  BIG.forEach((g,i)=>{
    const tagClass=g.betType==='ML DOG'?'tag-ml':g.betType.includes('DOG')?'tag-dog':'tag-spr';
    html+=`<div class="card" style="animation:fi .4s ease ${.12+i*.07}s both">
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
<div><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="tag ${tagClass}">${g.betType}</span><span style="font-size:10px;color:rgba(255,255,255,.25)">(${g.hS}) vs (${g.aS}) · ${g.time} ET</span></div><div style="font-size:18px;font-weight:800">${g.bet}</div></div>
<div style="text-align:right;flex-shrink:0"><div style="font-size:22px;font-weight:800;color:#00c805;line-height:1">+${g.edge}${g.edgeUnit||'pts'}</div><div style="font-size:9px;color:rgba(255,255,255,.25);margin-top:2px">${g.betType==='ML DOG'?'ML edge':'spread edge'}</div></div></div>
<div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:6px">${g.headline}</div>
<div style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:12px">${g.angle}</div>
<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">${g.why.map(w=>`<div class="stat-row ${w.good?'stat-good':'stat-bad'}"><span style="font-size:14px;font-weight:800;color:${w.good?'#00c805':'#ef4444'};min-width:52px;font-variant-numeric:tabular-nums">${w.stat}</span><div><div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.7)">${w.label}</div><div style="font-size:11px;color:rgba(255,255,255,.35)">${w.note}</div></div></div>`).join('')}</div>
${g.injury?`<div style="font-size:11px;color:rgba(255,255,255,.3);line-height:1.5;margin-bottom:10px">🏥 ${g.injury}</div>`:''}
<button class="btn" onclick="openModal(${i},true)">Full stat breakdown →</button></div>`;
  });

  html+=`<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:28px;animation:fi .4s ease .4s both">Also On The Card</div>`;

  OTHERS.forEach((g,i)=>{
    html+=`<div class="other" style="animation:fi .3s ease ${.45+i*.06}s both">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:14px;font-weight:700">${g.bet}</span></div>
<div style="font-size:11px;color:rgba(255,255,255,.25);margin-bottom:6px">(${g.hS}) ${g.home} vs (${g.aS}) ${g.away} · ${g.time}</div>
<div style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.5">${g.quick}</div>
${g.flag?`<div style="font-size:11px;color:#f59e0b;margin-top:4px">⚠️ ${g.flag}</div>`:''}</div>
<div style="text-align:right;flex-shrink:0;margin-left:12px"><div style="font-size:16px;font-weight:800;color:${g.edge>=2?'#00c805':'rgba(255,255,255,.4)'}">+${g.edge}</div><div style="font-size:9px;color:rgba(255,255,255,.2)">${g.unit} edge</div></div></div></div>`;
  });

  html+=`<div style="margin-top:32px;padding:16px;background:rgba(255,255,255,.02);border-radius:12px;border:1px solid rgba(255,255,255,.04);animation:fi .4s ease .7s both">
<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-bottom:8px">READING THE PICKS</div>
<div style="font-size:12px;color:rgba(255,255,255,.45);line-height:1.7"><strong style="color:#00c805">Spread edge (pts)</strong> = model's projected margin minus Vegas line. If model says -14 and line is -7.5, that's 6.5 pts of value.<br><br><strong style="color:#a78bfa">ML edge (%)</strong> = model's win probability minus what the moneyline implies. Plus-money on a team the model favors? That's the dream bet.</div></div>
<div style="margin-top:24px;text-align:center;font-size:10px;color:rgba(255,255,255,.12);line-height:1.7">For entertainment only. Past performance ≠ future results. Gamble responsibly.</div>`;

  html+=`<div id="modal-container"></div>`;
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
